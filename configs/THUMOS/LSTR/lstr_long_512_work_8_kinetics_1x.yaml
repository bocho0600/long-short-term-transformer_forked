DATA:
  DATA_NAME: 'THUMOS'
INPUT:
  MODALITY: 'twostream'
  VISUAL_FEATURE: 'rgb_kinetics_resnet50'
  MOTION_FEATURE: 'flow_kinetics_bninception'
MODEL:
  MODEL_NAME: 'LSTR'
  FEATURE_HEAD:
    LINEAR_ENABLED: True
    LINEAR_OUT_FEATURES: 1024
  LSTR:
    NUM_HEADS: 16
    DIM_FEEDFORWARD: 1024
    DROPOUT: 0.2
    ACTIVATION: 'relu'
    # the long-term memory window (mL), storing 1024 seconds of past video. At 4 FPS with LONG_MEMORY_SAMPLE_RATE: 4, 
    # this equals 4096 frames fed into the LSTR encoder.
    LONG_MEMORY_SECONDS: 2048       # was 512 - increased to test if more memory helps or worse
    LONG_MEMORY_SAMPLE_RATE: 4
    # Sliding long-memory window experiment. Keep LONG_MEMORY_SECONDS as the
    # searchable history, then feed only one sub-window to the model.
    # INDEX 0 is the most recent window; 1 shifts one stride farther back.
    LONG_MEMORY_WINDOW_SECONDS: 0
    LONG_MEMORY_WINDOW_STRIDE_SECONDS: 0
    LONG_MEMORY_WINDOW_INDEX: 0

    
    WORK_MEMORY_SECONDS: 8
    WORK_MEMORY_SAMPLE_RATE: 1
    ENC_MODULE: [
      [16, 1, True], [32, 2, True]
    ]
    DEC_MODULE: [-1, 2, True]
  CRITERIONS: [['MCE', {}]]
DATA_LOADER:
  BATCH_SIZE: 16
  NUM_WORKERS: 8
  PIN_MEMORY: True
SOLVER:
  NUM_EPOCHS: 25
  OPTIMIZER: 'adam'
  BASE_LR: 7e-05
  WEIGHT_DECAY: 5e-05
  SCHEDULER:
    SCHEDULER_NAME: 'warmup_cosine'
    WARMUP_FACTOR: 0.3
    WARMUP_EPOCHS: 10.0
    WARMUP_METHOD: 'linear'
